name: Vigilance CI/CD Pipeline

# WHEN this pipeline runs:
# Every push to main, and every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test the backend
  # Runs on every push — if this fails, nothing else runs
  # ─────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        run: python -m pytest test_api.py -v

  # ─────────────────────────────────────────
  # JOB 2: Build, push to ECR, deploy to ECS
  # Only runs if tests pass
  # Only runs on pushes to main (not pull requests)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1 — Give GitHub Actions permission to talk to AWS
      # Uses the secrets we added to the GitHub repo
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 2 — Authenticate Docker to ECR
      # Same as running: aws ecr get-login-password | docker login ...
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Step 3 — Build the Docker image and push to ECR
      # Same as: docker build → docker tag → docker push
      - name: Build, tag, and push image to ECR
        run: |
          docker build -t vigilance-backend ./backend
          docker tag vigilance-backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/vigilance-backend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/vigilance-backend:latest

      # Step 4 — Tell ECS to pull the new image and redeploy
      # Same as clicking "Force new deployment" in the console
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster vigilance-cluster \
            --service vigilance-backend-service \
            --force-new-deployment \
            --region us-east-1

      # Step 5 — Build frontend and sync to S3
      - name: Build and deploy frontend to S3
        run: |
          cd frontend
          npm ci
          npm run build
          aws s3 sync dist/ s3://vigilance-frontend --delete
