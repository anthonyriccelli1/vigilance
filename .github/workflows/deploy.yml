name: Vigilance CI/CD Pipeline

# WHEN this pipeline runs:
# Every push to main, and every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test the backend
  # Runs on every push — if this fails, nothing else runs
  # ─────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest   # GitHub spins up a fresh Linux VM for this

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # This clones your GitHub repo onto the Linux VM

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt
        # Installs everything in requirements.txt — FastAPI, SQLAlchemy, pytest, etc.

      - name: Run tests
        working-directory: ./backend
        run: python -m pytest test_api.py -v
        # Runs all 12 tests. If any fail, this step fails.
        # A failed step stops the entire job — nothing below this runs.

  # ─────────────────────────────────────────
  # JOB 2: Build the Docker image
  # Only runs if test-backend passes
  # Only runs on pushes to main (not pull requests)
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-backend   # This is the gate — "only run if test-backend succeeded"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx is Docker's modern build system — faster, supports multi-platform

      - name: Build backend Docker image
        run: |
          docker build -t vigilance-backend:latest ./backend
          echo "Docker image built successfully"
        # Builds the image but doesn't push it anywhere yet.
        # Pushing to AWS ECR comes in Phase 5 when we have AWS configured.

      - name: Verify image exists
        run: docker images vigilance-backend

